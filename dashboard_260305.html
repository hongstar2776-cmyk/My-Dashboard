<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>건설 업무 대시보드</title>
    <style>
        /* 기본 스타일 설정 및 호환성 높은 폰트 세팅 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-color: #f8f9fa;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', '맑은 고딕', sans-serif;
        }

        /* 상단 헤더 (메뉴바 전체 영역) */
        header {
            position: relative;
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0; /* 연한 회색 구분선 */
            z-index: 1000;
        }

        /* 헤더 내부 정렬 컨테이너 (로고 빈칸 + 메뉴 + 우측 여백) */
        .header-inner {
            display: flex;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            height: 70px;
            align-items: center;
        }

        /* 로고 영역 (요청에 따라 완전히 빈칸 처리, 클릭 시 HOME 이동 기능만 유지) */
        .logo-area {
            width: 120px;
            height: 100%;
            cursor: pointer;
        }

        /* 네비게이션 메인 메뉴 (6등분 그리드 적용으로 완벽한 간격 맞춤) */
        .nav-menu-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            height: 100%;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            font-weight: 700;
            color: #333333;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
        }

        /* 마우스 올렸을 때 상단에 생기는 포인트 라인 및 글자색 변경 */
        .nav-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #0056b3; /* 공기업 스타일의 신뢰감 있는 파란색 */
            opacity: 0;
            transition: opacity 0.2s;
        }

        .nav-item:hover {
            color: #0056b3;
        }

        .nav-item:hover::before {
            opacity: 1;
        }

        /* =========================================
           공공기관 스타일 전체 드롭다운 (메가 메뉴) 
           ========================================= */
        .mega-menu {
            position: absolute;
            top: 70px; /* 헤더 바로 아래에 위치 */
            left: 0;
            width: 100%;
            background-color: #ffffff;
            border-top: 1px solid #f1f5f9;
            border-bottom: 2px solid #2c3e50; /* 하단 마감 짙은 네이비 선 */
            box-shadow: 0 12px 20px rgba(0,0,0,0.06);
            display: none; /* 기본적으로 숨김 */
            padding-bottom: 30px;
            z-index: 999;
        }

        /* 헤더 영역에 마우스를 올리면 메가메뉴 표시 */
        header:hover .mega-menu {
            display: block;
        }

        /* 하위 메뉴 영역도 상단 메뉴와 완벽하게 동일한 간격 유지 */
        .mega-menu-inner {
            display: flex;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .mega-menu-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            padding-top: 20px;
        }

        /* 각 열(Column) 구분선 스타일 */
        .mega-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid #e5e7eb; /* 세로 구분선 */
            padding: 0 15px;
        }

        .mega-col:last-child {
            border-right: none; /* 마지막 열은 구분선 제거 */
        }

        /* 하위 메뉴 링크 스타일 */
        .mega-col a {
            display: block;
            width: 100%;
            text-align: center;
            padding: 12px 10px;
            text-decoration: none;
            color: #4b5563;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
            box-sizing: border-box;
            border-radius: 6px;
        }

        .mega-col a:hover {
            color: #0056b3;
            font-weight: 700;
            background-color: #f8fafc; /* 마우스 오버 시 옅은 회색 배경 */
        }

        /* 외부 링크 부가 설명 스타일 */
        .sub-text {
            display: block;
            font-size: 0.75rem;
            font-weight: normal;
            color: #94a3b8;
            margin-top: 4px;
            line-height: 1.3;
        }

        .mega-col a:hover .sub-text {
            color: #64748b;
        }

        .empty-msg {
            padding: 15px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        /* 하단 컨텐츠 영역 (Iframe) */
        main {
            flex: 1;
            position: relative;
            background-color: #f0f2f5;
        }

        /* 웹페이지를 불러올 Iframe (이제 기본으로 보이도록 설정) */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

    </style>
</head>
<body>

                <div class="logo-area" style="cursor: default;"></div> <!-- 좌우 대칭을 위한 우측 빈 공간 -->
            </div>
        </div>

    </header>

    <!-- 하단 컨텐츠 영역 -->

        <!-- 내부 링크들이 실제로 표시될 공간 (처음 접속 시 home.html을 기본으로 띄움) -->

    <script>

        function goHome() {

        // 내부 링크 클릭 시 호출 (이전 호환성을 위해 남겨둠)

</body>
</html>
