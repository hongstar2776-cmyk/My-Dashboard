<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 관리 시스템01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .modal { display: none; }
        .modal.active { display: flex; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 2s linear infinite; }

        th.dragging { opacity: 0.5; background-color: #e2e8f0; }
        .resizer { position: absolute; right: 0; top: 0; width: 5px; height: 100%; cursor: col-resize; user-select: none; }
        .resizer:hover, .resizing { background-color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen overflow-x-hidden">

    <!-- 강력한 인증/DB 에러 배너 -->
    <div id="criticalErrorBanner" class="hidden fixed top-4 left-4 right-4 md:left-1/2 md:-translate-x-1/2 md:w-full md:max-w-3xl z-[100] bg-red-50 border-2 border-red-500 text-red-800 p-5 rounded-2xl shadow-2xl flex items-start gap-4 transition-all">
        <i data-lucide="alert-triangle" class="w-8 h-8 flex-shrink-0 mt-0.5 text-red-600 animate-pulse"></i>
        <div class="flex-1">
            <p class="font-extrabold text-lg mb-1" id="criticalErrorTitle">⚠️ 설정 확인이 필요합니다!</p>
            <p id="criticalErrorText" class="text-sm mt-1 text-red-700 leading-relaxed"></p>
        </div>
        <button onclick="document.getElementById('criticalErrorBanner').classList.add('hidden')" class="text-red-400 hover:text-red-700">
            <i data-lucide="x" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- 메인 대시보드 화면 -->
    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold flex items-center gap-2 text-slate-800">
                    <i data-lucide="building-2" class="text-blue-600"></i>
                    프로젝트 관리
                </h1>
            </div>
            
            <div class="flex items-center gap-3 relative">
                <button id="viewOptionsBtn" class="flex items-center gap-2 bg-white border border-slate-300 px-4 py-2.5 rounded-xl text-sm font-medium hover:bg-slate-50 transition-colors shadow-sm">
                    <i data-lucide="sliders-horizontal" class="w-4 h-4"></i> 보기 옵션
                </button>
                
                <div id="viewOptionsDropdown" class="hidden absolute top-full right-0 mt-2 w-[340px] bg-white border border-slate-200 rounded-xl shadow-xl z-20 p-4">
                    <label class="flex items-center gap-2 pb-3 mb-3 border-b border-slate-100 cursor-pointer bg-slate-50 p-2 rounded-lg">
                        <input type="checkbox" id="hideCompletedToggle" class="w-4 h-4 rounded text-blue-600 focus:ring-blue-500">
                        <span class="text-sm font-bold text-slate-800 flex-1">준공 완료된 프로젝트 숨기기</span>
                        <i data-lucide="check-circle" class="w-4 h-4 text-green-500"></i>
                    </label>

                    <h4 class="text-xs font-bold text-slate-400 uppercase mb-3 px-1">표시할 열 선택</h4>
                    <div id="columnCheckboxes" class="max-h-80 overflow-y-auto pr-2 space-y-4"></div>
                </div>

                <button id="openModalBtn" class="flex items-center gap-2 bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-blue-700 transition-colors shadow-md shadow-blue-200">
                    <i data-lucide="plus" class="w-4 h-4 text-white"></i> 현장 추가
                </button>
            </div>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse whitespace-nowrap table-fixed">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs uppercase tracking-wider font-semibold" id="tableHeaderRow"></tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 text-sm"></tbody>
                </table>
            </div>
            
            <div id="tableLoading" class="flex flex-col items-center justify-center py-20 text-blue-500">
                <i data-lucide="loader-2" class="w-8 h-8 animate-spin"></i>
                <p class="mt-3 text-sm text-slate-500 font-medium">데이터를 불러오는 중...</p>
            </div>

            <div id="tableEmpty" class="hidden flex flex-col items-center justify-center py-20 text-slate-400">
                <div class="bg-slate-100 p-4 rounded-full mb-4">
                    <i data-lucide="inbox" class="w-8 h-8 text-slate-400"></i>
                </div>
                <p class="font-medium text-slate-600" id="emptyMessage">표시할 프로젝트가 없습니다.</p>
            </div>
        </div>
    </div>

    <!-- 현장 추가 모달 팝업 -->
    <div id="addModal" class="modal fixed inset-0 bg-slate-900/60 z-[50] items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-6xl max-h-[95vh] flex flex-col shadow-2xl overflow-hidden transform transition-all">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h2 class="text-lg font-bold flex items-center gap-2 text-slate-800">
                    <i data-lucide="file-scan" class="text-blue-600"></i> 새 프로젝트 일괄 등록
                </h2>
                <button id="closeModalBtn" class="text-slate-400 hover:text-red-500 bg-white rounded-full p-1 border border-slate-200 hover:bg-red-50">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="flex-1 overflow-hidden flex flex-col lg:flex-row bg-white">
                <div class="w-full lg:w-5/12 p-6 border-b lg:border-b-0 lg:border-r border-slate-100 flex flex-col gap-6 overflow-y-auto bg-slate-50/50">
                    
                    <div>
                        <h3 class="font-bold text-blue-800 mb-2 flex items-center gap-1.5"><i data-lucide="file-signature" class="w-4 h-4"></i> 공사 계약서 등록</h3>
                        <div id="uploadAreaContract" class="relative border-2 border-dashed border-blue-300 bg-blue-50/30 rounded-xl p-5 flex flex-col items-center justify-center text-center hover:bg-blue-50/80 cursor-pointer group mb-3 min-h-[120px]">
                            <input type="file" id="fileInputContract" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".pdf,image/png,image/jpeg">
                            <div class="bg-white p-2 rounded-full text-blue-600 mb-2 shadow-sm group-hover:scale-110 transition-transform">
                                <i data-lucide="upload-cloud" class="w-5 h-5"></i>
                            </div>
                            <p class="font-bold text-blue-800 text-sm">계약서 파일 첨부</p>
                        </div>
                        <div id="previewContainerContract" class="hidden w-full h-48 border border-slate-200 rounded-xl overflow-hidden bg-white relative mb-3 shadow-inner">
                            <embed id="pdfPreviewContract" class="hidden w-full h-full" type="application/pdf">
                            <img id="imgPreviewContract" class="hidden w-full h-full object-contain p-2">
                        </div>
                        <button id="scanBtnContract" disabled class="w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 bg-slate-200 text-slate-400 cursor-not-allowed">
                            <i data-lucide="bot" class="w-4 h-4"></i> <span id="scanBtnTextContract">계약서 업로드 대기중...</span>
                        </button>
                    </div>

                    <div class="border-t border-slate-200"></div>

                    <div>
                        <h3 class="font-bold text-emerald-800 mb-2 flex items-center gap-1.5"><i data-lucide="layout-template" class="w-4 h-4"></i> 공사 개요서 등록</h3>
                        <div id="uploadAreaOverview" class="relative border-2 border-dashed border-emerald-300 bg-emerald-50/30 rounded-xl p-5 flex flex-col items-center justify-center text-center hover:bg-emerald-50/80 cursor-pointer group mb-3 min-h-[120px]">
                            <input type="file" id="fileInputOverview" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".pdf,image/png,image/jpeg">
                            <div class="bg-white p-2 rounded-full text-emerald-600 mb-2 shadow-sm group-hover:scale-110 transition-transform">
                                <i data-lucide="upload-cloud" class="w-5 h-5"></i>
                            </div>
                            <p class="font-bold text-emerald-800 text-sm">개요서 파일 첨부</p>
                        </div>
                        <div id="previewContainerOverview" class="hidden w-full h-48 border border-slate-200 rounded-xl overflow-hidden bg-white relative mb-3 shadow-inner">
                            <embed id="pdfPreviewOverview" class="hidden w-full h-full" type="application/pdf">
                            <img id="imgPreviewOverview" class="hidden w-full h-full object-contain p-2">
                        </div>
                        <button id="scanBtnOverview" disabled class="w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 bg-slate-200 text-slate-400 cursor-not-allowed">
                            <i data-lucide="bot" class="w-4 h-4"></i> <span id="scanBtnTextOverview">개요서 업로드 대기중...</span>
                        </button>
                    </div>

                </div>
                
                <div class="w-full lg:w-7/12 p-6 overflow-y-auto relative bg-white">
                    <div class="flex items-center justify-between mb-4 pb-3 border-b border-slate-100 sticky top-0 bg-white z-10">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="clipboard-list" class="w-5 h-5 text-blue-600"></i> 프로젝트 통합 정보
                        </h3>
                        <span class="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded-md font-medium">자동 추출 및 수동 입력</span>
                    </div>
                    <form id="projectForm" class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5"></form>
                </div>
            </div>
            
            <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-3">
                <button id="cancelModalBtn" class="px-5 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-200">취소</button>
                <button id="saveProjectBtn" class="px-6 py-2.5 rounded-xl text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 flex items-center gap-2">
                    <i data-lucide="check-circle" class="w-4 h-4"></i> 최종 등록하기
                </button>
            </div>
        </div>
    </div>

    <!-- 현장 수정 모달 -->
    <div id="editModal" class="modal fixed inset-0 bg-slate-900/60 z-[50] items-center justify-center p-4 backdrop-blur-sm hidden">
        <div class="bg-white rounded-2xl w-full max-w-4xl max-h-[95vh] flex flex-col shadow-2xl overflow-hidden transform transition-all">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-blue-50">
                <h2 class="text-lg font-bold flex items-center gap-2 text-blue-800">
                    <i data-lucide="pencil" class="text-blue-600"></i> 프로젝트 정보 수정
                </h2>
                <button id="closeEditBtn" class="text-blue-400 hover:text-blue-700 bg-white rounded-full p-1 border border-blue-200 hover:bg-blue-100">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-6 bg-white">
                <form id="editProjectForm" class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5"></form>
            </div>
            
            <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-3">
                <button id="cancelEditBtn" class="px-5 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-200">취소</button>
                <button id="saveEditBtn" class="px-6 py-2.5 rounded-xl text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 flex items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> 수정 사항 저장
                </button>
            </div>
        </div>
    </div>

    <!-- 삭제 확인 모달 -->
    <div id="confirmModal" class="modal fixed inset-0 bg-slate-900/60 z-[60] items-center justify-center p-4 backdrop-blur-sm hidden">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl flex flex-col items-center text-center">
            <div class="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mb-4">
                <i data-lucide="alert-triangle" class="w-6 h-6"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-800 mb-2">프로젝트 삭제</h3>
            <p class="text-sm text-slate-500 mb-6">이 프로젝트를 정말 삭제하시겠습니까?</p>
            <div class="flex gap-3 w-full">
                <button id="cancelConfirmBtn" class="flex-1 px-4 py-2.5 rounded-xl font-medium bg-slate-100 text-slate-700 hover:bg-slate-200">취소</button>
                <button id="okConfirmBtn" class="flex-1 px-4 py-2.5 rounded-xl font-bold bg-red-600 text-white hover:bg-red-700">삭제하기</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // ⭐ 잘 작동하던 Gemini 2.5 Flash 버전으로 원상복구
        // ==========================================
        const apiKey = "AIzaSyBBGQE_o7WRPvg6RlOttkXyNFkD8vbQnF0"; 
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDL5m8zW1PF6Y_PBHGV7mM4NoquTmrt0RM",
            authDomain: "project-list-21920.firebaseapp.com",
            projectId: "project-list-21920",
            storageBucket: "project-list-21920.firebasestorage.app",
            messagingSenderId: "973863678039",
            appId: "1:973863678039:web:3d41a45c845a27cb3ff312"
        };
        const customAppId = "project-list-21920";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-xl text-white font-bold shadow-xl z-[100] transition-opacity duration-300 ${isError ? 'bg-red-600' : 'bg-slate-800'}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 5000);
        }

        const ALL_FIELDS = [
            { id: "projectName", label: "공사명", default: true, type: 'contract', group: '기본 정보', colSpan: 2 },
            { id: "location", label: "공사현장", default: true, type: 'overview', group: '기본 정보', colSpan: 2 },
            { id: "contractAmount", label: "계약금액", default: true, type: 'contract', group: '계약 금액' },
            { id: "supplyValue", label: "공급가액", default: false, type: 'contract', group: '계약 금액' },
            { id: "vat", label: "부가가치세", default: false, type: 'contract', group: '계약 금액' },
            { id: "contractDate", label: "계약일", default: true, type: 'contract', group: '일정 관리' },
            { id: "startDate", label: "착공일", default: true, type: 'contract', group: '일정 관리' },
            { id: "endDate", label: "준공일", default: true, type: 'contract', group: '일정 관리' },
            { id: "clientName", label: "도급인(발주처)", default: true, type: 'contract', group: '업체 정보' },
            { id: "clientCEO", label: "도급인 대표", default: false, type: 'contract', group: '업체 정보' },
            { id: "contractorName", label: "수급인(시공사)", default: false, type: 'contract', group: '업체 정보' },
            { id: "siteArea", label: "대지면적", default: false, type: 'overview', group: '건축 개요' },
            { id: "totalFloorArea", label: "연면적", default: false, type: 'overview', group: '건축 개요' },
            { id: "buildingArea", label: "건축면적", default: false, type: 'overview', group: '건축 개요' },
            { id: "maxHeight", label: "최고높이", default: false, type: 'overview', group: '건축 개요' },
            { id: "floors", label: "층수", default: false, type: 'overview', group: '건축 개요' },
            { id: "zone", label: "지역/지구", default: false, type: 'overview', group: '건축 개요' },
            { id: "mainPurpose", label: "주용도", default: false, type: 'overview', group: '건축 개요' },
        ];

        let currentUser = null;
        let unsubscribeDb = null;
        let projects = [];
        let editingProjectId = null;
        
        let filesData = {
            contract: { base64: null, mimeType: null },
            overview: { base64: null, mimeType: null }
        };
        
        const savedColumns = localStorage.getItem('visibleColumns');
        let visibleColumns = savedColumns ? JSON.parse(savedColumns) : ALL_FIELDS.filter(f => f.default).map(f => f.id);
        const savedWidths = localStorage.getItem('columnWidths');
        let columnWidths = savedWidths ? JSON.parse(savedWidths) : {};
        const savedHideCompleted = localStorage.getItem('hideCompleted');
        let hideCompleted = savedHideCompleted !== null ? JSON.parse(savedHideCompleted) : true;

        const DOM = {
            viewOptionsBtn: document.getElementById('viewOptionsBtn'),
            viewOptionsDropdown: document.getElementById('viewOptionsDropdown'),
            hideCompletedToggle: document.getElementById('hideCompletedToggle'),
            columnCheckboxes: document.getElementById('columnCheckboxes'),
            tableHeaderRow: document.getElementById('tableHeaderRow'),
            tableBody: document.getElementById('tableBody'),
            tableLoading: document.getElementById('tableLoading'),
            tableEmpty: document.getElementById('tableEmpty'),
            emptyMessage: document.getElementById('emptyMessage'),
            
            addModal: document.getElementById('addModal'),
            openModalBtn: document.getElementById('openModalBtn'),
            closeModalBtn: document.getElementById('closeModalBtn'),
            cancelModalBtn: document.getElementById('cancelModalBtn'),
            saveProjectBtn: document.getElementById('saveProjectBtn'),
            projectForm: document.getElementById('projectForm'),
            
            editModal: document.getElementById('editModal'),
            closeEditBtn: document.getElementById('closeEditBtn'),
            cancelEditBtn: document.getElementById('cancelEditBtn'),
            saveEditBtn: document.getElementById('saveEditBtn'),
            editProjectForm: document.getElementById('editProjectForm')
        };

        function initDropdown() {
            DOM.hideCompletedToggle.checked = hideCompleted;
            DOM.hideCompletedToggle.addEventListener('change', (e) => {
                hideCompleted = e.target.checked;
                localStorage.setItem('hideCompleted', JSON.stringify(hideCompleted));
                renderTable();
            });

            DOM.columnCheckboxes.innerHTML = '';
            const groups = [...new Set(ALL_FIELDS.map(f => f.group))];
            
            groups.forEach(groupName => {
                const groupDiv = document.createElement('div');
                groupDiv.className = "mb-4";
                groupDiv.innerHTML = `<div class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2 pb-1 border-b border-slate-100">${groupName}</div>`;
                
                const gridDiv = document.createElement('div');
                gridDiv.className = "grid grid-cols-2 gap-2";

                ALL_FIELDS.filter(f => f.group === groupName).forEach(field => {
                    const isChecked = visibleColumns.includes(field.id);
                    const label = document.createElement('label');
                    label.className = "flex items-center gap-2 p-1.5 hover:bg-slate-50 rounded cursor-pointer transition-colors";
                    label.innerHTML = `
                        <input type="checkbox" class="column-toggle w-3.5 h-3.5 rounded border-slate-300 text-blue-600 focus:ring-blue-500" value="${field.id}" ${isChecked ? 'checked' : ''}>
                        <span class="text-xs font-medium text-slate-700 select-none truncate" title="${field.label}">${field.label}</span>
                    `;
                    gridDiv.appendChild(label);
                });
                groupDiv.appendChild(gridDiv);
                DOM.columnCheckboxes.appendChild(groupDiv);
            });

            document.querySelectorAll('.column-toggle').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    if (e.target.checked) visibleColumns.push(e.target.value);
                    else visibleColumns = visibleColumns.filter(col => col !== e.target.value);
                    localStorage.setItem('visibleColumns', JSON.stringify(visibleColumns));
                    renderTable();
                });
            });

            DOM.viewOptionsBtn.addEventListener('click', (e) => { e.stopPropagation(); DOM.viewOptionsDropdown.classList.toggle('hidden'); });
            document.addEventListener('click', (e) => { if (!DOM.viewOptionsDropdown.contains(e.target) && e.target !== DOM.viewOptionsBtn) DOM.viewOptionsDropdown.classList.add('hidden'); });
        }

        function renderFullForm(containerId, isEdit = false) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            const groups = [...new Set(ALL_FIELDS.map(f => f.group))];
            groups.forEach(groupName => {
                const groupHeader = document.createElement('div');
                groupHeader.className = "md:col-span-2 mt-4 first:mt-0 pb-2 border-b border-slate-200";
                groupHeader.innerHTML = `<h4 class="font-bold text-slate-700 text-sm flex items-center gap-2"><div class="w-2 h-2 rounded-full ${isEdit ? 'bg-blue-500' : 'bg-slate-400'}"></div> ${groupName}</h4>`;
                container.appendChild(groupHeader);

                ALL_FIELDS.filter(f => f.group === groupName).forEach(field => {
                    const div = document.createElement('div');
                    div.className = field.colSpan === 2 ? "md:col-span-2 space-y-1.5" : "space-y-1.5";
                    
                    div.innerHTML = `
                        <label class="block text-xs font-bold text-slate-500 uppercase pl-1">${field.label}</label>
                        <input type="text" id="${isEdit ? 'edit_' : 'input_'}${field.id}" placeholder="${field.label} 입력..." 
                               class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm text-slate-800 transition-all shadow-sm">
                    `;
                    container.appendChild(div);
                });
            });
        }

        function isPastEndDate(dateStr) {
            if (!dateStr || dateStr === "정보 없음" || dateStr.trim() === "") return false;
            const matches = dateStr.match(/\d+/g);
            if (matches && matches.length >= 3) {
                const year = parseInt(matches[0]);
                const month = parseInt(matches[1]) - 1; 
                const day = parseInt(matches[2]);
                const endDate = new Date(year, month, day);
                const today = new Date();
                today.setHours(0,0,0,0);
                return endDate < today;
            }
            return false;
        }

        let draggedColumn = null;
        function renderTable() {
            DOM.tableHeaderRow.innerHTML = '';
            visibleColumns.forEach((colId) => {
                const field = ALL_FIELDS.find(f => f.id === colId);
                if (!field) return;

                const th = document.createElement('th');
                th.className = "px-4 py-4 border-b border-slate-200 relative group truncate select-none";
                th.style.width = columnWidths[colId] ? `${columnWidths[colId]}px` : '150px';
                th.draggable = true;
                th.innerHTML = `${field.label}<div class="resizer" data-id="${colId}"></div>`;

                th.addEventListener('dragstart', () => { draggedColumn = colId; th.classList.add('dragging'); });
                th.addEventListener('dragend', () => th.classList.remove('dragging'));
                th.addEventListener('dragover', (e) => e.preventDefault());
                th.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (draggedColumn && draggedColumn !== colId) {
                        const fromIdx = visibleColumns.indexOf(draggedColumn);
                        const toIdx = visibleColumns.indexOf(colId);
                        visibleColumns.splice(fromIdx, 1);
                        visibleColumns.splice(toIdx, 0, draggedColumn);
                        localStorage.setItem('visibleColumns', JSON.stringify(visibleColumns));
                        renderTable();
                    }
                });
                DOM.tableHeaderRow.appendChild(th);
            });

            const actionTh = document.createElement('th');
            actionTh.className = "px-4 py-4 w-24 text-center border-b border-slate-200";
            actionTh.textContent = "관리";
            DOM.tableHeaderRow.appendChild(actionTh);

            setupResizers();

            DOM.tableBody.innerHTML = '';
            
            let filteredProjects = projects;
            if (hideCompleted) {
                filteredProjects = projects.filter(p => !isPastEndDate(p.endDate));
            }

            if (filteredProjects.length === 0) {
                DOM.tableLoading.classList.add('hidden');
                DOM.tableEmpty.classList.remove('hidden');
                DOM.emptyMessage.textContent = hideCompleted && projects.length > 0 
                    ? "완료된 프로젝트가 숨겨져 있습니다." : "등록된 프로젝트가 없습니다.";
                return;
            }

            DOM.tableEmpty.classList.add('hidden');
            const sortedProjects = [...filteredProjects].sort((a, b) => b.createdAt - a.createdAt);

            sortedProjects.forEach(project => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/50 transition-colors group";
                
                visibleColumns.forEach(colId => {
                    const field = ALL_FIELDS.find(f => f.id === colId);
                    if (!field) return;

                    const td = document.createElement('td');
                    td.className = "px-4 py-3 border-b border-slate-100 truncate";
                    td.style.maxWidth = columnWidths[colId] ? `${columnWidths[colId]}px` : '150px';
                    
                    const value = project[colId];
                    if (value === "정보 없음") {
                        td.innerHTML = `<span class="text-red-500 font-bold bg-red-50 px-2 py-0.5 rounded">정보 없음</span>`;
                    } else if (colId === 'projectName') {
                        td.innerHTML = `<span class="font-bold text-slate-800">${value || '-'}</span>`;
                    } else {
                        td.textContent = value || '-';
                    }
                    tr.appendChild(td);
                });

                const actionTd = document.createElement('td');
                actionTd.className = "px-4 py-3 border-b border-slate-100 text-center";
                actionTd.innerHTML = `
                    <div class="flex justify-center items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="window.openEdit('${project.id}')" class="text-slate-400 hover:text-blue-600 p-1.5 rounded-lg hover:bg-blue-50 transition-colors" title="수정">
                            <i data-lucide="pencil" class="w-4 h-4"></i>
                        </button>
                        <button onclick="window.requestDelete('${project.id}')" class="text-slate-400 hover:text-red-600 p-1.5 rounded-lg hover:bg-red-50 transition-colors" title="삭제">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                tr.appendChild(actionTd);
                DOM.tableBody.appendChild(tr);
            });
            lucide.createIcons();
        }

        function setupResizers() {
            const resizers = document.querySelectorAll('.resizer');
            let currentResizer, startX, startWidth, colId, targetTh;

            const onMouseMove = (e) => {
                const newWidth = startWidth + (e.pageX - startX);
                targetTh.style.width = `${newWidth}px`;
                columnWidths[colId] = newWidth;
            };

            const onMouseUp = () => {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                if(currentResizer) currentResizer.classList.remove('resizing');
                localStorage.setItem('columnWidths', JSON.stringify(columnWidths));
                renderTable(); 
            };

            resizers.forEach(resizer => {
                resizer.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                    currentResizer = e.target;
                    currentResizer.classList.add('resizing');
                    targetTh = currentResizer.parentElement;
                    colId = currentResizer.getAttribute('data-id');
                    startX = e.pageX;
                    startWidth = targetTh.offsetWidth;
                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                });
            });
        }

        /* ================= CRUD 로직 ================= */
        let projectToDelete = null;

        window.requestDelete = (docId) => {
            projectToDelete = docId;
            document.getElementById('confirmModal').classList.add('active');
            document.getElementById('confirmModal').classList.remove('hidden');
        };
        document.getElementById('cancelConfirmBtn').addEventListener('click', () => {
            document.getElementById('confirmModal').classList.remove('active');
            document.getElementById('confirmModal').classList.add('hidden');
        });
        document.getElementById('okConfirmBtn').addEventListener('click', async () => {
            if(!currentUser || !projectToDelete) return;
            document.getElementById('confirmModal').classList.remove('active');
            document.getElementById('confirmModal').classList.add('hidden');
            try {
                await deleteDoc(doc(db, 'artifacts', customAppId, 'users', currentUser.uid, 'projects', projectToDelete));
                showToast("삭제되었습니다.");
            } catch (err) { showToast(`삭제 실패: ${err.message}`, true); }
        });

        window.openEdit = (docId) => {
            const project = projects.find(p => p.id === docId);
            if (!project) return;
            
            editingProjectId = docId;
            ALL_FIELDS.forEach(field => {
                const input = document.getElementById(`edit_${field.id}`);
                if (input) input.value = project[field.id] || "";
            });
            
            DOM.editModal.classList.remove('hidden');
            DOM.editModal.classList.add('active');
        };

        const closeEditModal = () => {
            DOM.editModal.classList.add('hidden');
            DOM.editModal.classList.remove('active');
            editingProjectId = null;
        };
        DOM.closeEditBtn.addEventListener('click', closeEditModal);
        DOM.cancelEditBtn.addEventListener('click', closeEditModal);

        DOM.saveEditBtn.addEventListener('click', async () => {
            if (!currentUser || !editingProjectId) return;
            const updatedData = {};
            ALL_FIELDS.forEach(field => {
                const input = document.getElementById(`edit_${field.id}`);
                if (input) updatedData[field.id] = input.value.trim();
            });

            DOM.saveEditBtn.disabled = true;
            DOM.saveEditBtn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 저장중...`;
            try {
                await updateDoc(doc(db, 'artifacts', customAppId, 'users', currentUser.uid, 'projects', editingProjectId), updatedData);
                showToast("성공적으로 수정되었습니다.");
                closeEditModal();
            } catch (err) { showToast(`수정 실패: ${err.message}`, true); } 
            finally {
                DOM.saveEditBtn.disabled = false;
                DOM.saveEditBtn.innerHTML = `<i data-lucide="save" class="w-4 h-4"></i> 수정 사항 저장`;
                lucide.createIcons();
            }
        });

        function subscribeData() {
            if (!currentUser) return;
            DOM.tableLoading.classList.remove('hidden');
            DOM.tableEmpty.classList.add('hidden');

            const projectsRef = collection(db, 'artifacts', customAppId, 'users', currentUser.uid, 'projects');
            unsubscribeDb = onSnapshot(projectsRef, (snapshot) => {
                projects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                DOM.tableLoading.classList.add('hidden');
                renderTable();
            }, (error) => { 
                DOM.tableLoading.classList.add('hidden');
                console.error("Firestore Listen Error:", error);
                if (error.code === 'permission-denied') {
                    const banner = document.getElementById('criticalErrorBanner');
                    banner.classList.remove('hidden');
                    document.getElementById('criticalErrorTitle').innerHTML = "⚠️ Firestore 보안 규칙(접근 권한)이 차단되어 있습니다!";
                    document.getElementById('criticalErrorText').innerHTML = `
                        Firebase 콘솔 접속 > Firestore Database > <strong>규칙(Rules)</strong> 탭에서 코드를 다음과 같이 수정 후 게시(Publish)하세요.<br>
                        <code class="block bg-red-100 p-2 mt-2 rounded text-red-800 font-mono text-xs">
                        rules_version = '2';<br>
                        service cloud.firestore {<br>
                        &nbsp;&nbsp;match /databases/{database}/documents {<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;match /{document=**} {<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;allow read, write: if request.auth != null;<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;}<br>
                        &nbsp;&nbsp;}<br>
                        }
                        </code>
                    `;
                } else {
                    showToast(`DB 접속 에러: ${error.message}`, true);
                }
            });
        }

        async function initializeAuth() {
            try {
                let customTokenSuccess = false;
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try { await signInWithCustomToken(auth, __initial_auth_token); customTokenSuccess = true; } catch (e) {}
                }
                if (!customTokenSuccess) await signInAnonymously(auth);
            } catch (e) {
                console.error("Auth error:", e);
                const banner = document.getElementById('criticalErrorBanner');
                banner.classList.remove('hidden');
                const textEl = document.getElementById('criticalErrorText');
                
                if (e.message.includes('domain') || e.code === 'auth/unauthorized-domain') {
                    document.getElementById('criticalErrorTitle').innerHTML = "⚠️ 현재 도메인이 차단되었습니다 (GitHub Pages)";
                    textEl.innerHTML = `
                        현재 사용 중인 깃허브 주소가 Firebase에 등록되지 않았습니다.<br>
                        1. Firebase 콘솔 > Authentication > 설정(Settings) > <strong>승인된 도메인(Authorized domains)</strong> 이동<br>
                        2. <strong>도메인 추가</strong> 버튼을 눌러 현재 브라우저 주소창의 주소(예: <code>내이름.github.io</code>)를 추가하세요.
                    `;
                } else if (e.code === 'auth/configuration-not-found' || e.code === 'auth/admin-restricted-operation' || e.code === 'auth/operation-not-allowed') {
                    document.getElementById('criticalErrorTitle').innerHTML = "⚠️ 익명 로그인이 활성화되지 않았습니다.";
                    textEl.innerHTML = `
                        Firebase 프로젝트에서 익명 로그인이 꺼져있습니다.<br>
                        1. Firebase 콘솔 이동 > Authentication > Sign-in method 탭<br>
                        2. <strong>익명(Anonymous)</strong> 제공업체를 추가하고 '사용 설정' 후 저장하세요.
                    `;
                } else {
                    textEl.innerHTML = `인증 실패: ${e.message}<br>Firebase 설정을 확인해주세요.`;
                }
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) subscribeData();
            else if(unsubscribeDb) unsubscribeDb();
        });

        function setupUploader(type) {
            const inputEl = document.getElementById(`fileInput${type}`);
            const areaEl = document.getElementById(`uploadArea${type}`);
            const prevContainerEl = document.getElementById(`previewContainer${type}`);
            const pdfEl = document.getElementById(`pdfPreview${type}`);
            const imgEl = document.getElementById(`imgPreview${type}`);
            const btnEl = document.getElementById(`scanBtn${type}`);
            const textEl = document.getElementById(`scanBtnText${type}`);
            
            inputEl.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const typeKey = type.toLowerCase();
                filesData[typeKey].mimeType = file.type;
                
                const reader = new FileReader();
                reader.onload = (evt) => {
                    filesData[typeKey].base64 = evt.target.result.split(',')[1];
                    areaEl.classList.add('hidden');
                    prevContainerEl.classList.remove('hidden');
                    
                    if (file.type === 'application/pdf') {
                        pdfEl.src = evt.target.result; pdfEl.classList.remove('hidden'); imgEl.classList.add('hidden');
                    } else {
                        imgEl.src = evt.target.result; imgEl.classList.remove('hidden'); pdfEl.classList.add('hidden');
                    }

                    btnEl.disabled = false;
                    btnEl.classList.remove('bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
                    btnEl.classList.add(type === 'Contract' ? 'bg-blue-600' : 'bg-emerald-600', 'text-white', 'shadow-md');
                    textEl.textContent = "AI로 분석하기";
                };
                reader.readAsDataURL(file);
            });
        }

        setupUploader('Contract');
        setupUploader('Overview');

        // ⭐ 원래 잘 작동했던 gemini-2.5-flash-preview-09-2025 로 원상복구
        async function performScan(typeStr) {
            const typeKey = typeStr.toLowerCase();
            const { base64, mimeType } = filesData[typeKey];
            if (!base64) return;

            const btnEl = document.getElementById(`scanBtn${typeStr}`);
            const textEl = document.getElementById(`scanBtnText${typeStr}`);
            const isContract = typeKey === 'contract';
            
            btnEl.disabled = true;
            btnEl.className = `w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 text-white ${isContract ? 'bg-blue-400' : 'bg-emerald-400'}`;
            textEl.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin inline-block align-middle"></i> 분석 중...`;
            lucide.createIcons();

            try {
                let userPrompt = isContract 
                    ? `계약서에서 추출: 키 값(영문): "projectName" (공사명), "contractAmount" (계약금액), "contractDate" (계약일), "startDate" (착공일), "endDate" (준공일), "clientName" (도급인/발주처), "clientCEO" (도급인 대표자), "contractorName" (수급인/시공사), "supplyValue" (공급가액), "vat" (부가가치세). 찾을 수 없으면 빈 문자열("").`
                    : `개요서에서 추출: 키 값(영문): "location" (대지위치/공사현장), "siteArea" (대지면적), "totalFloorArea" (연면적), "buildingArea" (건축면적), "maxHeight" (최고높이), "floors" (층수), "zone" (지역/지구), "mainPurpose" (주용도). 찾을 수 없으면 빈 문자열("").`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userPrompt }, { inlineData: { mimeType: mimeType || "application/pdf", data: base64 } }] }],
                        systemInstruction: { parts: [{ text: "Valid JSON only. No markdown." }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    console.error("API Error Details:", errData);
                    throw new Error(errData.error?.message || "Google API 서버 에러");
                }
                
                const text = (await response.json()).candidates?.[0]?.content?.parts?.[0]?.text;
                if(!text) throw new Error("추출된 데이터가 없습니다.");

                const data = JSON.parse(text);
                
                ALL_FIELDS.forEach(field => {
                    const isTargetField = field.type === typeKey || (isContract && field.id === 'projectName') || (!isContract && field.id === 'location');
                    if (!isTargetField) return;

                    const input = document.getElementById(`input_${field.id}`);
                    if (input && data[field.id]) {
                        input.value = data[field.id];
                        input.classList.remove('text-red-500', 'bg-red-50');
                        input.classList.add('bg-green-50', 'border-green-300');
                        setTimeout(() => input.classList.remove('bg-green-50', 'border-green-300'), 1500);
                    } else if (input && !input.value) {
                        input.value = "정보 없음";
                        input.classList.add('text-red-500', 'font-bold', 'bg-red-50');
                    }
                });

                textEl.textContent = "추출 완료!";
                btnEl.className = "w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 bg-green-500 text-white";
            } catch (err) {
                console.error(err);
                textEl.textContent = "분석 실패 (다시 시도)";
                btnEl.className = `w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 text-white ${isContract ? 'bg-blue-600' : 'bg-emerald-600'}`;
                btnEl.disabled = false;
                showToast(`AI 분석 실패: ${err.message}`, true);
            }
        }

        document.getElementById('scanBtnContract').addEventListener('click', () => performScan('Contract'));
        document.getElementById('scanBtnOverview').addEventListener('click', () => performScan('Overview'));

        function resetAddModal() {
            filesData = { contract: { base64: null, mimeType: null }, overview: { base64: null, mimeType: null } };
            ['Contract', 'Overview'].forEach(type => {
                document.getElementById(`fileInput${type}`).value = '';
                document.getElementById(`uploadArea${type}`).classList.remove('hidden');
                document.getElementById(`previewContainer${type}`).classList.add('hidden');
                const btn = document.getElementById(`scanBtn${type}`);
                btn.disabled = true;
                btn.className = "w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 bg-slate-200 text-slate-400 cursor-not-allowed";
                document.getElementById(`scanBtnText${type}`).textContent = `${type === 'Contract' ? '계약서' : '개요서'} 업로드 대기중...`;
            });
            renderFullForm('projectForm', false);
        }

        function toggleAddModal(show) {
            if (show) {
                resetAddModal();
                DOM.addModal.classList.add('active');
            } else {
                DOM.addModal.classList.remove('active');
            }
        }

        DOM.openModalBtn.addEventListener('click', () => toggleAddModal(true));
        DOM.closeModalBtn.addEventListener('click', () => toggleAddModal(false));
        DOM.cancelModalBtn.addEventListener('click', () => toggleAddModal(false));

        DOM.projectForm.addEventListener('input', (e) => {
            if (e.target.tagName === 'INPUT') {
                e.target.classList.remove('text-red-500', 'font-bold', 'bg-red-50');
                if (e.target.value === "정보 없음") e.target.value = "";
            }
        });

        DOM.saveProjectBtn.addEventListener('click', async () => {
            if (!currentUser) return showToast("DB 연결 상태를 확인해주세요.", true);
            const newProject = { createdAt: Date.now() };
            
            const inputs = DOM.projectForm.querySelectorAll('input');
            let hasData = false;
            inputs.forEach(input => {
                const id = input.id.replace('input_', '');
                const val = input.value.trim();
                newProject[id] = val;
                if(val && val !== "정보 없음") hasData = true;
            });

            if (!hasData) return showToast("저장할 정보가 없습니다.", true);

            DOM.saveProjectBtn.disabled = true;
            DOM.saveProjectBtn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 저장중...`;

            try {
                await addDoc(collection(db, 'artifacts', customAppId, 'users', currentUser.uid, 'projects'), newProject);
                toggleAddModal(false);
                showToast("저장되었습니다.");
            } catch (err) { showToast(`저장 실패: ${err.message}`, true); } 
            finally {
                DOM.saveProjectBtn.disabled = false;
                DOM.saveProjectBtn.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4"></i> 최종 등록하기`;
            }
        });

        initDropdown();
        renderFullForm('projectForm', false);
        renderFullForm('editProjectForm', true);
        lucide.createIcons();
        initializeAuth();
    </script>
</body>
</html>
